<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>吃货同步协议</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
    <script type="text/javascript">
        window._AMapSecurityConfig = { securityJsCode: AMAP_CONFIG.SECURITY_CODE }
    </script>
</head>
<body>

    <header class="gem-topbar" id="gem-topbar">
        <div class="gem-topbar-inner">
            <button id="drawer-toggle" class="gem-icon-btn gem-menu-toggle" type="button" aria-label="打开主菜单" aria-expanded="false" aria-controls="side-panel">
                <svg class="gem-ico gem-ico-menu" aria-hidden="true" viewBox="0 0 24 24" width="24" height="24" focusable="false">
                    <path fill="currentColor" d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
                </svg>
                <svg class="gem-ico gem-ico-close" aria-hidden="true" viewBox="0 0 24 24" width="24" height="24" focusable="false">
                    <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                </svg>
            </button>
            <div class="gem-topbar-brand">
                <span class="gem-topbar-logo" aria-hidden="true">
                    <svg class="gem-sparkle" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
                        <path fill="url(#gemTopbarSparkle)" d="M12 2l1.09 6.26L18 9l-4.91.74L12 16l-1.09-6.26L6 9l4.91-.74L12 2z"/>
                        <defs>
                            <linearGradient id="gemTopbarSparkle" x1="6" y1="2" x2="18" y2="16" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#4f8df5"/>
                                <stop offset="1" stop-color="#8ab4f8"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </span>
                <span class="gem-topbar-title">吃货同步协议</span>
            </div>
            <div class="gem-topbar-actions">
                <button id="theme-picker-toggle" class="gem-icon-btn theme-picker-toggle" type="button" aria-label="切换背景主题" aria-expanded="false" aria-controls="theme-picker-panel">
                    <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
                        <path fill="currentColor" d="M12 3C7.03 3 3 7.03 3 12a9 9 0 0 0 9 9h.74a2.26 2.26 0 0 0 1.6-3.86 1.75 1.75 0 0 1 1.24-2.99H18a3 3 0 0 0 3-3c0-4.97-4.03-8-9-8zm-5 9a1.5 1.5 0 1 1 3.001.001A1.5 1.5 0 0 1 7 12zm3-4a1.5 1.5 0 1 1 3.001.001A1.5 1.5 0 0 1 10 8zm4 0a1.5 1.5 0 1 1 3.001.001A1.5 1.5 0 0 1 14 8z"/>
                    </svg>
                </button>
                <div id="theme-picker-panel" class="theme-picker-panel" hidden aria-label="背景主题">
                    <button type="button" class="theme-swatch" data-theme-bg="#FDF6EC" data-theme-primary="#1A73E8" data-theme-border="#9AB8E6" style="--swatch-color:#FDF6EC;" aria-label="奶油米白"></button>
                    <button type="button" class="theme-swatch" data-theme-bg="#F3F8EE" data-theme-primary="#2E7D32" data-theme-border="#8FCF8A" style="--swatch-color:#F3F8EE;" aria-label="薄荷清新"></button>
                    <button type="button" class="theme-swatch" data-theme-bg="#F4F1FB" data-theme-primary="#5E35B1" data-theme-border="#B59DE5" style="--swatch-color:#F4F1FB;" aria-label="薰衣草紫"></button>
                    <button type="button" class="theme-swatch" data-theme-bg="#FFF2E8" data-theme-primary="#EF6C00" data-theme-border="#F1AA6B" style="--swatch-color:#FFF2E8;" aria-label="落日橙"></button>
                    <button type="button" class="theme-swatch" data-theme-bg="#ECF7F7" data-theme-primary="#00838F" data-theme-border="#7FCBD3" style="--swatch-color:#ECF7F7;" aria-label="海盐青"></button>
                </div>
            </div>
        </div>
    </header>

    <div id="drawer-scrim" class="drawer-scrim" aria-hidden="true"></div>

    <aside id="side-panel" class="gem-side-panel" aria-hidden="true" aria-label="收藏夹">
        <div class="gem-drawer-head">
            <h2 class="gem-drawer-title">收藏</h2>
            <button type="button" class="gem-icon-btn gem-drawer-close" id="drawer-close-btn" aria-label="关闭侧边栏">
                <svg class="gem-ico" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
                    <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                </svg>
            </button>
        </div>
        <div class="drawer-body gem-drawer-body">
            <div id="collection-list">
                <h4 class="collection-title">小组</h4>
                <div id="city-pill-bar" class="city-pill-scroll" aria-label="按小组筛选"></div>
                <section id="group-settings-panel" class="group-panel" aria-label="小组设置" hidden>
                    <div class="group-panel-inner">
                        <div class="group-actions">
                            <button type="button" id="group-create-btn" class="group-btn">创建小组</button>
                            <button type="button" id="group-join-btn" class="group-btn">加入小组</button>
                        </div>
                        <div id="group-create-box" class="group-box" hidden>
                            <div class="group-box-title">先给你的小组取个名字</div>
                            <input id="group-name-input" class="group-name-input" type="text" maxlength="20" placeholder="例如：武汉探店团">
                            <button type="button" id="group-create-confirm" class="group-join-confirm">确认创建</button>
                        </div>
                        <div id="group-join-box" class="group-box" hidden>
                            <input id="group-join-input" class="group-join-input" type="text" maxlength="6" placeholder="输入 6 位密钥">
                            <button type="button" id="group-join-confirm" class="group-join-confirm">确认加入</button>
                        </div>
                        <p id="group-status" class="group-status" hidden role="status"></p>
                    </div>
                </section>
                <h4 class="collection-title">我的收藏</h4>
                <div id="collection-group-identity" class="collection-group-identity"></div>
                <div id="collection-tree"></div>
            </div>
        </div>
    </aside>

    <div id="search-float">
        <div class="search-float-row">
            <div class="search-city-group">
                <label class="search-city-label" for="searchCityInput">城市</label>
                <input type="text" id="searchCityInput" class="search-city-input" list="search-city-suggestions" placeholder="如：武汉" autocomplete="off" aria-label="搜索城市">
                <datalist id="search-city-suggestions">
                    <option value="武汉">
                    <option value="北京">
                    <option value="上海">
                    <option value="广州">
                    <option value="深圳">
                    <option value="成都">
                    <option value="杭州">
                    <option value="南京">
                    <option value="西安">
                    <option value="重庆">
                </datalist>
                <button type="button" id="searchCityApply" class="search-city-apply">定位</button>
            </div>
            <div class="search-box search-box-main">
                <input type="text" id="searchInput" placeholder="在当前城市搜索餐饮…" autocomplete="off">
                <button type="button" id="searchSubmitBtn" class="search-submit-btn" aria-label="搜索">
                    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                        <path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6 6 0 1 0-.71.71l.27.28v.79L20 21.5 21.5 20l-6-6zM10 14a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/>
                    </svg>
                </button>
            </div>
        </div>
        <p id="search-city-hint" class="search-city-hint" hidden role="status"></p>
        <div id="result-list"></div>
    </div>

    <div id="container"></div>

    <script src="js/map-engine.js"></script>
    <script src="js/group.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/collection-ui.js"></script>
    <script src="js/search.js"></script>
    <script src="js/protocol-nav.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
