<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>美食私藏地图</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/config.js"></script>
    <script type="text/javascript">
        window._AMapSecurityConfig = { securityJsCode: AMAP_CONFIG.SECURITY_CODE }
    </script>
</head>
<body>

    <header class="gem-topbar" id="gem-topbar">
        <div class="gem-topbar-inner">
            <button id="drawer-toggle" class="gem-icon-btn gem-menu-toggle" type="button" aria-label="打开主菜单" aria-expanded="false" aria-controls="side-panel">
                <svg class="gem-ico gem-ico-menu" aria-hidden="true" viewBox="0 0 24 24" width="24" height="24" focusable="false">
                    <path fill="currentColor" d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
                </svg>
                <svg class="gem-ico gem-ico-close" aria-hidden="true" viewBox="0 0 24 24" width="24" height="24" focusable="false">
                    <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                </svg>
            </button>
            <div class="gem-topbar-brand">
                <span class="gem-topbar-logo" aria-hidden="true">
                    <svg class="gem-sparkle" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
                        <path fill="url(#gemTopbarSparkle)" d="M12 2l1.09 6.26L18 9l-4.91.74L12 16l-1.09-6.26L6 9l4.91-.74L12 2z"/>
                        <defs>
                            <linearGradient id="gemTopbarSparkle" x1="6" y1="2" x2="18" y2="16" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#4f8df5"/>
                                <stop offset="1" stop-color="#8ab4f8"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </span>
                <span class="gem-topbar-title">美食私藏地图</span>
            </div>
        </div>
    </header>

    <div id="drawer-scrim" class="drawer-scrim" aria-hidden="true"></div>

    <aside id="side-panel" class="gem-side-panel" aria-hidden="true" aria-label="收藏夹">
        <div class="gem-drawer-head">
            <h2 class="gem-drawer-title">菜单</h2>
            <button type="button" class="gem-icon-btn gem-drawer-close" id="drawer-close-btn" aria-label="关闭侧边栏">
                <svg class="gem-ico" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
                    <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                </svg>
            </button>
        </div>
        <div class="drawer-body gem-drawer-body">
            <div id="collection-list">
                <h4 class="collection-title">当前版本</h4>
                <div id="collection-tree">
                    <div class="collection-empty">已精简为武汉搜索模式，其他功能暂时关闭。</div>
                </div>
            </div>
        </div>
    </aside>

    <div id="search-float">
        <div class="search-float-row">
            <div class="search-city-group">
                <label class="search-city-label" for="searchCityInput">城市</label>
                <input type="text" id="searchCityInput" class="search-city-input" value="武汉" readonly aria-label="搜索城市">
                <button type="button" id="searchCityApply" class="search-city-apply" disabled>已锁定</button>
            </div>
            <div class="search-box search-box-main">
                <input type="text" id="searchInput" placeholder="在武汉搜索餐饮…" autocomplete="off">
            </div>
        </div>
        <p id="search-city-hint" class="search-city-hint" role="status">当前仅支持武汉搜索。</p>
        <div id="result-list"></div>
    </div>

    <div id="container"></div>

    <script src="js/map-engine.js"></script>
    <script src="js/search.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
