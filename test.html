<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>高德地图最简测试</title>
    <style>#container { width: 100%; height: 500px; }</style>
</head>
<body>
    <div id="container"></div>
    <script type="text/javascript">
        // 1. 确保这里的密钥真的是 32 位，且没有多余空格（与 js/config.js 中 SECURITY_CODE 一致时可同步修改）
        window._AMapSecurityConfig = { securityJsCode: '050e227945533547df0a66b0fdc5928' };
    </script>
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=9e003dbbac324e4fbb9df5874b7d8e57"></script>
    <script type="text/javascript">
        try {
            var map = new AMap.Map('container', { zoom: 11, center: [114.30, 30.60] });
            console.log('✅ 地图初始化成功！');
        } catch (e) {
            console.error('❌ 依然报错:', e);
        }
    </script>
</body>
</html>
